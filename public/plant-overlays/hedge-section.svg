<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- Ground contact shadow -->
  <ellipse cx="160" cy="195" rx="142" ry="7" fill="#002800" fill-opacity="0.28"/>

  <!-- Back wall — full rectangle, darkest -->
  <rect x="0" y="32" width="320" height="162" rx="3" fill="#18500e" fill-opacity="0.88"/>

  <!-- Irregular top silhouette — gives organic hedge profile -->
  <path d="M 0 32 Q 20 20 40 30 Q 60 16 80 28 Q 100 14 120 26 Q 140 10 160 24
           Q 180 14 200 26 Q 220 16 240 28 Q 260 18 280 28 Q 300 20 320 28
           L 320 32 L 0 32 Z"
        fill="#1e6414" fill-opacity="0.92"/>

  <!-- Vertical foliage column bands -->
  <rect x="4"   y="38" width="30" height="158" rx="15" fill="#28781c" fill-opacity="0.55"/>
  <rect x="42"  y="28" width="30" height="168" rx="15" fill="#28781c" fill-opacity="0.55"/>
  <rect x="82"  y="34" width="30" height="162" rx="15" fill="#28781c" fill-opacity="0.55"/>
  <rect x="122" y="24" width="30" height="172" rx="15" fill="#28781c" fill-opacity="0.55"/>
  <rect x="162" y="32" width="30" height="164" rx="15" fill="#28781c" fill-opacity="0.55"/>
  <rect x="202" y="26" width="30" height="170" rx="15" fill="#28781c" fill-opacity="0.55"/>
  <rect x="242" y="34" width="30" height="162" rx="15" fill="#28781c" fill-opacity="0.55"/>
  <rect x="282" y="28" width="34" height="168" rx="17" fill="#28781c" fill-opacity="0.55"/>

  <!-- Front mid-tone fill -->
  <path d="M 0 48 Q 40 36 80 46 Q 120 34 160 44 Q 200 34 240 46 Q 280 36 320 44
           L 320 200 L 0 200 Z"
        fill="#348c22" fill-opacity="0.42"/>

  <!-- Top leaf highlights -->
  <ellipse cx="30"  cy="26" rx="22" ry="13" fill="#44a82c" fill-opacity="0.58"/>
  <ellipse cx="70"  cy="18" rx="24" ry="13" fill="#4ab830" fill-opacity="0.56"/>
  <ellipse cx="110" cy="24" rx="22" ry="12" fill="#44a82c" fill-opacity="0.56"/>
  <ellipse cx="152" cy="16" rx="26" ry="14" fill="#4ab830" fill-opacity="0.58"/>
  <ellipse cx="194" cy="22" rx="22" ry="13" fill="#44a82c" fill-opacity="0.56"/>
  <ellipse cx="234" cy="18" rx="24" ry="13" fill="#4ab830" fill-opacity="0.56"/>
  <ellipse cx="274" cy="24" rx="22" ry="12" fill="#44a82c" fill-opacity="0.56"/>
</svg>
