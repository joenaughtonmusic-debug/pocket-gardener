<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" width="200" height="230">
  <!-- Ground contact shadow -->
  <ellipse cx="100" cy="222" rx="72" ry="9" fill="#002800" fill-opacity="0.28"/>

  <!-- Back mass — deepest green, widest extent -->
  <ellipse cx="100" cy="118" rx="74" ry="76" fill="#18500e" fill-opacity="0.88"/>

  <!-- Second layer — adds irregular shoulder bumps -->
  <ellipse cx="58"  cy="132" rx="46" ry="54" fill="#22641a" fill-opacity="0.80"/>
  <ellipse cx="142" cy="132" rx="46" ry="54" fill="#22641a" fill-opacity="0.80"/>
  <ellipse cx="100" cy="96"  rx="54" ry="54" fill="#22641a" fill-opacity="0.80"/>

  <!-- Mid layer — main visible canopy -->
  <ellipse cx="78"  cy="142" rx="40" ry="46" fill="#307d20" fill-opacity="0.78"/>
  <ellipse cx="122" cy="142" rx="40" ry="46" fill="#307d20" fill-opacity="0.78"/>
  <ellipse cx="100" cy="108" rx="50" ry="52" fill="#307d20" fill-opacity="0.78"/>
  <ellipse cx="60"  cy="108" rx="34" ry="40" fill="#307d20" fill-opacity="0.72"/>
  <ellipse cx="140" cy="108" rx="34" ry="40" fill="#307d20" fill-opacity="0.72"/>

  <!-- Front highlight clusters -->
  <ellipse cx="86"  cy="118" rx="30" ry="34" fill="#3e9828" fill-opacity="0.72"/>
  <ellipse cx="114" cy="122" rx="28" ry="32" fill="#3e9828" fill-opacity="0.72"/>
  <ellipse cx="100" cy="96"  rx="34" ry="36" fill="#3e9828" fill-opacity="0.70"/>
  <ellipse cx="68"  cy="100" rx="24" ry="28" fill="#4aad2e" fill-opacity="0.65"/>
  <ellipse cx="132" cy="100" rx="24" ry="28" fill="#4aad2e" fill-opacity="0.65"/>

  <!-- Brightest top highlights -->
  <ellipse cx="95"  cy="88"  rx="22" ry="24" fill="#58c438" fill-opacity="0.58"/>
  <ellipse cx="118" cy="96"  rx="18" ry="22" fill="#58c438" fill-opacity="0.55"/>
  <ellipse cx="78"  cy="94"  rx="18" ry="20" fill="#62d040" fill-opacity="0.50"/>
</svg>
